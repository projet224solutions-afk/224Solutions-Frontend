# ============================================================
#  224Solutions — Nginx config pour SPA statique (frontend)
#  Ce fichier sert le build React/Vite (dossier dist/)
#  Copier vers : /etc/nginx/sites-available/224solutions
#  Activer : ln -s /etc/nginx/sites-available/224solutions /etc/nginx/sites-enabled/
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name 224solution.net www.224solution.net;

    # Let's Encrypt ACME challenge (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Bloc HTTPS — sert le build statique React/Vite
server {
    listen 443 ssl http2;
    server_name 224solution.net www.224solution.net;

    # ── Certificats SSL (Certbot les remplit automatiquement) ──────────────
    ssl_certificate     /etc/letsencrypt/live/224solution.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/224solution.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Logs ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/224solutions_access.log;
    error_log  /var/log/nginx/224solutions_error.log;

    # ── Dossier build React/Vite ──────────────────────────────────────────
    # Pointe vers le dossier dist/ après `npm run build`
    root /var/www/224solutions/dist;
    index index.html;

    # ── Taille max uploads (images, prescriptions ordonnances, etc.) ───────
    client_max_body_size 50M;

    # ── Compression Gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/rss+xml text/javascript image/svg+xml;

    # ── Headers sécurité ───────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "frame-ancestors 'self'"          always;

    # ── SPA routing — CRITIQUE pour React Router ───────────────────────────
    # Toutes les routes inconnues renvoient index.html
    # Sans ce bloc, un refresh sur /services/restaurant retourne 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets statiques Vite (JS/CSS avec hash dans le nom) ──────────────
    # Vite génère des noms avec hash (ex: index-Dz8m3kPq.js) → cache 1 an
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Fichiers public/ (manifest, icons, sounds) ────────────────────────
    location ~* \.(webmanifest|json|png|ico|mp3|svg|jpg|jpeg|gif|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Health check (optionnel, utile pour monitoring) ───────────────────
    location /healthz {
        alias /var/www/224solutions/dist/healthz.json;
        add_header Content-Type application/json;
        access_log off;
    }

    # ── Short links proxy vers Supabase Edge Function ──────────────────────
    # Correspond à la règle dans vercel.json et netlify.toml
    location /s/ {
        proxy_pass https://uakkxaibujzxdiqzpnpr.supabase.co/functions/v1/short-link/;
        proxy_http_version 1.1;
        proxy_set_header Host uakkxaibujzxdiqzpnpr.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
#  COMMANDES DE DÉPLOIEMENT SUR VPS
#  (à exécuter depuis le dossier du projet)
# ============================================================
#
#  1. Build du frontend :
#     npm install && npm run build
#
#  2. Copier dist/ vers le VPS :
#     rsync -avz --delete dist/ user@vps:/var/www/224solutions/dist/
#
#  3. Activer la config Nginx :
#     sudo ln -sf /etc/nginx/sites-available/224solutions /etc/nginx/sites-enabled/
#     sudo nginx -t && sudo systemctl reload nginx
#
#  4. SSL Let's Encrypt (première fois) :
#     sudo certbot --nginx -d 224solution.net -d www.224solution.net
#
#  ⚠️  PAS DE PM2 — ce frontend n'est pas un serveur Node.js.
#      PM2 et le proxy vers :3000 sont pour le repo backend séparé.
# ============================================================
